name: CD Deploy to Cloud VM

on:
  workflow_run:
    workflows: ["CI Semantic Versioning"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VM_USER }}/robomunch-backend2 || git clone https://github.com/${{ github.repository }}.git /home/${{ secrets.VM_USER }}/robomunch-backend2
            cd /home/${{ secrets.VM_USER }}/robomunch-backend2
            git pull origin main
            docker build -t robomunch-backend2 .
            docker stop robomunch-backend2-container || true
            docker rm robomunch-backend2-container || true
            docker run -d \
              --name robomunch-backend2-container \
              --restart unless-stopped \
              -p 8080:8080 \
              robomunch-backend2
